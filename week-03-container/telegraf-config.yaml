apiVersion: v1
kind: ConfigMap
metadata:
  name: telegraf-config
data:
  telegraf.conf: |
    [[inputs.mqtt_consumer]]
      servers = ["tcp://mosquitto-service:1883"]
      topics = ["flowstation/telemetry"]
      data_format = "json"

    [[outputs.influxdb_v2]]
      urls = ["http://influxdb-service:8086"]
      token = "my-super-secret-token" # this will be secured later (check week 5)
      organization = "flowstation-ops"
      bucket = "telemetry-history"
